<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Storybook Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2230;
            --surface3: #21293a;
            --border: rgba(255,255,255,0.08);
            --text: #e6edf3;
            --muted: #7d8590;
            --faint: #3d444d;
            --accent: #58a6ff;
            --green: #3fb950;
            --cyan: #39c5cf;
            --red: #f85149;
            --orange: #d29922;
            --shadow: 0 8px 24px rgba(0,0,0,0.4);
            --radius: 12px;
            --font-body: 'Inter', sans-serif;
            --font-display: 'Nunito', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.6;
        }
        h1, h2, h3 { font-family: var(--font-display); }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px 80px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 24px;
            margin-bottom: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-title h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff, #39c5cf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .config-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
            padding: 6px 12px;
            background: var(--surface2);
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }
        .status-dot.active { background: var(--green); }
        .grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            align-items: start;
        }
        @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 24px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, textarea, select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface3);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        textarea { resize: vertical; min-height: 80px; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            width: 100%;
            font-family: var(--font-display);
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--surface2); border-color: var(--muted); }
        .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; }
        .actions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-new { background: rgba(57, 197, 207, 0.15); color: var(--cyan); }
        .chapters-container { display: flex; flex-direction: column; gap: 24px; }
        .chapter-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chapter-header {
            padding: 16px 24px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chapter-title { font-size: 18px; font-weight: 700; }
        .chapter-body { padding: 24px; }
        .chapter-content { color: var(--text); white-space: pre-wrap; margin-bottom: 20px; }
        .image-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--surface2);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid var(--border);
        }
        .chapter-image { width: 100%; height: 100%; object-fit: cover; }
        .loader {
            width: 32px;
            height: 32px;
            border: 3px solid var(--faint);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(13, 17, 23, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }
        .loading-text { font-size: 12px; color: var(--accent); font-weight: 600; }
        .download-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(13, 17, 23, 0.7);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .image-container:hover .download-btn { opacity: 1; }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 12px;
            background: var(--surface3);
            border: 1px solid var(--accent);
            color: white;
            font-size: 14px;
            box-shadow: var(--shadow);
            z-index: 1000;
            display: none;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .history-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 13px;
        }
        .history-item:hover { background: var(--surface2); }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-title">
                <h1>Storybook Studio</h1>
                <span class="badge badge-new">Cloud Sync</span>
            </div>
            <div class="config-status" id="configStatus">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Caricamento configurazione...</span>
                <button class="btn btn-outline btn-sm" onclick="showHistory()" style="margin-left:8px">📜 Storico</button>
            </div>
        </header>

        <div class="grid">
            <aside class="panel">
                <div class="section-title">✨ Setup Storia</div>
                
                <div class="form-group">
                    <label>Titolo o Idea</label>
                    <input type="text" id="storyTitle" placeholder="es. Le avventure di un robot strambo">
                </div>

                <div class="form-group">
                    <label>Personaggi e Atmosfera</label>
                    <textarea id="characterInput" placeholder="Descrivi chi sono i protagonisti e il tono del racconto..."></textarea>
                </div>

                <button class="btn btn-outline" id="refineBtn" onclick="refineIdea()">
                    🪄 Raffina le idee
                </button>

                <div class="form-group" style="margin-top: 20px;">
                    <label>Bozza Storia (o raffinata)</label>
                    <textarea id="refinedInput" style="min-height: 120px;" placeholder="Qui apparirà la bozza raffinata..."></textarea>
                </div>

                <div class="form-group">
                    <label>AI Modello Testo</label>
                    <select id="textProvider">
                        <option value="groq">Groq (Llama 3 70B) - Veloce</option>
                        <option value="gemini">Google Gemini 1.5 Pro</option>
                        <option value="deepseek">DeepSeek Chat</option>
                        <option value="openrouter">OpenRouter (Auto)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>AI Modello Immagini</label>
                    <select id="imageProvider">
                        <option value="pollinations">Pollinations.ai (Gratis)</option>
                    </select>
                </div>

                <button class="btn btn-primary" id="generateBtn" onclick="generateChapters()">
                    📚 Crea 10 Capitoli
                </button>

                <div class="actions-row">
                    <button class="btn btn-outline" id="saveBtn" onclick="saveToGitHub()">
                        💾 Salva/Aggiorna
                    </button>
                    <button class="btn btn-outline" onclick="exportJSON()">
                        📤 Esporta JSON
                    </button>
                </div>
            </aside>

            <main class="chapters-container" id="chaptersOutput">
                <!-- I capitoli verranno inseriti qui -->
            </main>
        </div>
    </div>

    <div id="toast" class="toast">Messaggio</div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div class="section-title">📂 Storie salvate su GitHub</div>
            <div id="historyList">Caricamento...</div>
            <button class="btn btn-outline" style="margin-top:20px" onclick="hideModal()">Chiudi</button>
        </div>
    </div>

    <script>
        let config = {};
        let currentStoryData = {
            title: '',
            characters: '',
            refined: '',
            chapters: []
        };

        async function init() {
            try {
                const res = await fetch('.settings/config.json');
                if (res.ok) {
                    config = await res.json();
                    document.getElementById('statusDot').classList.add('active');
                    document.getElementById('statusText').innerText = 'Cloud Config OK';
                    showToast('Configurazione caricata correttamente');
                } else {
                    throw new Error();
                }
            } catch (e) {
                document.getElementById('statusText').innerText = 'Manuale (config.json non trovato)';
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function showModal() { document.getElementById('historyModal').style.display = 'flex'; }
        function hideModal() { document.getElementById('historyModal').style.display = 'none'; }

        async function callTextAI(prompt, system = "Sei un assistente creativo.") {
            const provider = document.getElementById('textProvider').value;
            
            if (provider === 'groq') {
                const key = config.groq;
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'llama3-70b-8192',
                        messages: [{role: 'system', content: system}, {role: 'user', content: prompt}],
                        temperature: 0.7
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } else if (provider === 'gemini') {
                const key = config.gemini;
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${system}

${prompt}` }] }]
                    })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } else if (provider === 'deepseek') {
                const key = config.deepseek;
                const res = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [{role: 'system', content: system}, {role: 'user', content: prompt}]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } else if (provider === 'openrouter') {
                const key = config.openRouter;
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'google/gemini-pro-1.5-exp',
                        messages: [{role: 'user', content: `${system}

${prompt}`}]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            }
        }

        async function refineIdea() {
            const title = document.getElementById('storyTitle').value;
            const chars = document.getElementById('characterInput').value;
            if (!title) return alert('Inserisci un titolo o un\'idea');

            const btn = document.getElementById('refineBtn');
            btn.innerText = '✨ Raffinando...';
            btn.disabled = true;

            try {
                const prompt = `Titolo: ${title}
Personaggi/Atmosfera: ${chars}

Crea una bozza narrativa coerente di circa 300 parole che serva da base per una storia in 10 capitoli. Sii creativo e suggestivo.`;
                const result = await callTextAI(prompt, "Sei un autore professionista di libri per ragazzi.");
                document.getElementById('refinedInput').value = result;
                currentStoryData.refined = result;
            } catch (e) {
                alert('Errore raffinazione: ' + e.message);
            } finally {
                btn.innerText = '🪄 Raffina le idee';
                btn.disabled = false;
            }
        }

        async function generateChapters() {
            const refined = document.getElementById('refinedInput').value;
            if (!refined) return alert('Raffina prima l\'idea o scrivi una bozza.');

            const btn = document.getElementById('generateBtn');
            btn.innerText = '📖 Scrittura in corso (Part 1/2)...';
            btn.disabled = true;
            document.getElementById('chaptersOutput').innerHTML = '';
            currentStoryData.chapters = [];

            try {
                // Parte 1: Capitoli 1-5
                const prompt1 = `Basandoti su questa bozza: "${refined}", scrivi i primi 5 capitoli della storia. 
                Restituisci SOLO un oggetto JSON valido con questa struttura: 
                {"chapters": [{"title": "Titolo Cap 1", "content": "Contenuto lungo...", "imagePrompt": "prompt per immagine"}]}`;
                
                const res1Text = await callTextAI(prompt1, "Sei uno scrittore. Rispondi SOLO in formato JSON.");
                const data1 = JSON.parse(res1Text.match(/\{[\s\S]*\}/)[0]);
                
                renderChapters(data1.chapters);
                currentStoryData.chapters = data1.chapters;

                // Parte 2: Capitoli 6-10
                btn.innerText = '📖 Scrittura in corso (Part 2/2)...';
                const prompt2 = `Continua la storia basata sulla bozza "${refined}" e su quanto successo nei primi capitoli: ${JSON.stringify(data1.chapters.map(c=>c.title))}.
                Scrivi i capitoli dal 6 al 10.
                Restituisci SOLO un oggetto JSON valido con la stessa struttura: 
                {"chapters": [{"title": "Titolo Cap 6", "content": "...", "imagePrompt": "..."}]}`;
                
                const res2Text = await callTextAI(prompt2, "Sei uno scrittore. Rispondi SOLO in formato JSON.");
                const data2 = JSON.parse(res2Text.match(/\{[\s\S]*\}/)[0]);
                
                renderChapters(data2.chapters);
                currentStoryData.chapters = currentStoryData.chapters.concat(data2.chapters);

                showToast('Storia completata! Generazione immagini avviata.');
                generateAllImages();
            } catch (e) {
                console.error(e);
                alert('Errore generazione: ' + e.message);
            } finally {
                btn.innerText = '📚 Crea 10 Capitoli';
                btn.disabled = false;
            }
        }

        function renderChapters(newChapters) {
            const container = document.getElementById('chaptersOutput');
            newChapters.forEach((ch, i) => {
                const idx = currentStoryData.chapters.length + i;
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.id = `chapter-${idx}`;
                card.innerHTML = `
                    <div class="chapter-header">
                        <div class="chapter-title">${ch.title}</div>
                        <div class="badge badge-new">Capitolo ${idx + 1}</div>
                    </div>
                    <div class="chapter-body">
                        <div class="image-container" id="img-cont-${idx}">
                            <div class="loading-overlay"><div class="loader"></div><div class="loading-text">In attesa...</div></div>
                        </div>
                        <div class="chapter-content">${ch.content}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function generateAllImages() {
            for (let i = 0; i < currentStoryData.chapters.length; i++) {
                const ch = currentStoryData.chapters[i];
                const container = document.getElementById(`img-cont-${i}`);
                if (!container) continue;

                try {
                    const seed = Math.floor(Math.random() * 1000000);
                    const prompt = encodeURIComponent(`high quality digital art, storybook style, ${ch.imagePrompt}`);
                    const url = `https://image.pollinations.ai/prompt/${prompt}?seed=${seed}&width=1280&height=720&nologo=true`;
                    
                    // Pre-caricamento per gestire l'overlay
                    const img = new Image();
                    img.src = url;
                    img.className = 'chapter-image';
                    img.onload = () => {
                        container.innerHTML = '';
                        container.appendChild(img);
                        const dBtn = document.createElement('button');
                        dBtn.className = 'download-btn';
                        dBtn.innerText = '⬇ Scarica';
                        dBtn.onclick = () => downloadImage(url, `${currentStoryData.title}_Cap_${i+1}.jpg`);
                        container.appendChild(dBtn);
                    };
                } catch (e) {
                    container.innerHTML = '<div style="color:red; font-size:12px">Errore immagine</div>';
                }
            }
        }

        async function downloadImage(url, filename) {
            const response = await fetch(url);
            const blob = await response.blob();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        async function saveToGitHub() {
            if (!config.githubToken) return alert('Configurazione GitHub mancante.');
            
            const title = document.getElementById('storyTitle').value || 'Senza Titolo';
            const fileName = `stories/${title.replace(/\s+/g, '_').toLowerCase()}.json`;
            
            currentStoryData.title = title;
            currentStoryData.characters = document.getElementById('characterInput').value;
            currentStoryData.refined = document.getElementById('refinedInput').value;

            const btn = document.getElementById('saveBtn');
            btn.innerText = 'Saving...';
            
            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentStoryData, null, 2))));
                const url = `https://api.github.com/repos/${config.githubOwner}/${config.githubRepo}/contents/${fileName}`;
                
                // Cerca se esiste già (per l'update)
                let sha = null;
                const check = await fetch(url, { headers: { 'Authorization': `token ${config.githubToken}` } });
                if (check.ok) {
                    const existing = await check.json();
                    sha = existing.sha;
                }

                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${config.githubToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Salvataggio storia: ${title}`,
                        content: content,
                        sha: sha
                    })
                });

                if (res.ok) showToast('Storia salvata su GitHub!');
                else throw new Error('Errore durante il salvataggio');
            } catch (e) {
                alert(e.message);
            } finally {
                btn.innerText = '💾 Salva/Aggiorna';
            }
        }

        async function showHistory() {
            if (!config.githubToken) return alert('Configurazione GitHub mancante.');
            showModal();
            const list = document.getElementById('historyList');
            list.innerHTML = 'Caricamento...';

            try {
                const res = await fetch(`https://api.github.com/repos/${config.githubOwner}/${config.githubRepo}/contents/stories`, {
                    headers: { 'Authorization': `token ${config.githubToken}` }
                });
                const files = await res.json();
                list.innerHTML = '';
                files.filter(f => f.name.endsWith('.json')).forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerText = f.name.replace('.json', '').replace(/_/g, ' ');
                    item.onclick = () => loadStory(f.download_url);
                    list.appendChild(item);
                });
            } catch (e) {
                list.innerHTML = 'Nessuna storia trovata o errore.';
            }
        }

        async function loadStory(url) {
            hideModal();
            showToast('Caricamento storia...');
            const res = await fetch(url);
            const data = await res.json();
            
            currentStoryData = data;
            document.getElementById('storyTitle').value = data.title;
            document.getElementById('characterInput').value = data.characters;
            document.getElementById('refinedInput').value = data.refined;
            
            if (data.chapters && data.chapters.length > 0) {
                document.getElementById('chaptersOutput').innerHTML = '';
                renderChapters(data.chapters);
                generateAllImages();
            }
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentStoryData, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `${currentStoryData.title || 'storia'}.json`);
            dlAnchorElem.click();
        }

        init();
    </script>
</body>
</html>
